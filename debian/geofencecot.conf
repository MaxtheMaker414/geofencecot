# geofencecot Configuration.
# Change values here, and restart with: sudo systemctl restart geofencecot

# CoT address to read markers from / send alerts to (required, vorinstalliert).
COT_URL=udp+wo://239.2.3.1:6969

# PyTAK: lokale Interface-Adresse fuer ausgehenden Multicast-Traffic
# (Pi mit mehreren NICs) (vorinstalliert).
PYTAK_MULTICAST_LOCAL_ADDR=10.41.0.1

# Own position: static OR gpsd. Aktiv per Default ist gpsd/gpspipe (GPS_INFO_CMD),
# solange STATIC_LAT/STATIC_LON nicht gesetzt sind.
# STATIC_LAT=
# STATIC_LON=
# STATIC_HAE=
GPS_INFO_CMD=gpspipe --json -n 5

# Hinweis: POLL_INTERVAL wird von geofencecot aktuell NICHT ausgewertet
# (der Marker-Empfang ist ereignisbasiert, kein Intervall-Polling).
# POLL_INTERVAL=10

# Geofence evaluation (Werte entsprechen den aktiven Defaults)
DISTANCE_THRESHOLD_M=500
IGNORE_ABOVE_M=0
ALERT_COOLDOWN_S=300
IGNORE_OWN_UID=true

# Alert / warning (Werte entsprechen den aktiven Defaults)
ALERT_TYPE=Geo-fence Breached
ALERT_COT_TYPE=b-a-o-tbl
ALERT_STALE=300

# Identity: aktiv sind bereits Hostname (Callsign) und /etc/machine-id (COT_UID),
# hier nur ueberschreiben, falls gewuenscht.
# CALLSIGN=
# COT_UID=

# PyTAK Configuration: https://pytak.rtfd.io/
# TAK_PROTO=0
# DEBUG=
# PREF_PACKAGE=
# PYTAK_TLS_CLIENT_CERT=
# PYTAK_TLS_CLIENT_KEY=
# PYTAK_TLS_CLIENT_PASSWORD=
# PYTAK_TLS_DONT_VERIFY=
# PYTAK_TLS_DONT_CHECK_HOSTNAME=
# PYTAK_TLS_CLIENT_CAFILE=
# PYTAK_TLS_SERVER_EXPECTED_HOSTNAME=
