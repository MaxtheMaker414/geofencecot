[geofencecot]
; geofencecot example configuration. All parameters ARE IN ALL CAPS.
;
; geofencecot reads CoT markers from a UDP multicast group and sends an
; emergency-alert CoT event (911 Alert / Ring The Bell / Geo-fence Breached /
; In Contact) whenever a marker comes within DISTANCE_THRESHOLD_M of your
; own position.

; CoT address (required, vorinstalliert). Used both ways:
;   - geofencecot itself joins this multicast group directly to READ markers,
;     regardless of the URL scheme prefix.
;   - PyTAK uses this URL to WRITE the alert event back out (udp:// for
;     read+write sockets, udp+wo:// for write-only sockets — either works
;     for sending, since geofencecot reads the group itself).
COT_URL = udp+wo://239.2.3.1:6969

; PyTAK: lokale Interface-Adresse fuer ausgehenden Multicast-Traffic
; (relevant bei Hosts mit mehreren Netzwerkschnittstellen, z. B. Pi mit
; Ethernet + WLAN). Vorinstalliert.
PYTAK_MULTICAST_LOCAL_ADDR = 10.41.0.1

; --- Own position -----------------------------------------------------
; Static coordinates (both required to enable static mode). If unset,
; geofencecot falls back to gpsd via GPS_INFO_CMD (aktiv per Default), same as lincot.
; STATIC_LAT = 45.0
; STATIC_LON = -122.0
; STATIC_HAE = 100.0
GPS_INFO_CMD = gpspipe --json -n 5

; Hinweis: POLL_INTERVAL wird von geofencecot aktuell NICHT ausgewertet
; (der Marker-Empfang ist ereignisbasiert per Multicast-Socket, kein
; Intervall-Polling). Bleibt hier nur als Platzhalter fuer spaetere Versionen.
; POLL_INTERVAL = 10

; --- Geofence evaluation ------------------------------------------------
; Alert when a marker is within this many meters of your position.
DISTANCE_THRESHOLD_M = 500

; Ignore (skip evaluating) markers farther away than this many meters.
; Useful to cut noise from distant/irrelevant tracks. 0 = disabled (aktiver Default).
IGNORE_ABOVE_M = 0

; Don't re-alert on the same marker uid more often than this (seconds).
ALERT_COOLDOWN_S = 300

; Skip markers whose uid matches our own COT_UID/machine-id (avoid self-alerts).
IGNORE_OWN_UID = true

; --- Alert / warning -----------------------------------------------------
; One of: 911 Alert | Ring The Bell | Geo-fence Breached | In Contact
ALERT_TYPE = Geo-fence Breached
; ATAK emergency-alert CoT type; leave as default unless you know you need
; something else.
ALERT_COT_TYPE = b-a-o-tbl
ALERT_STALE = 300

; Identity: aktiv sind bereits Hostname (Callsign) und /etc/machine-id (COT_UID);
; hier nur ueberschreiben, falls gewuenscht.
; CALLSIGN = my-edge-node
; COT_UID =

; Hinweis: COT_STALE wird von geofencecot aktuell NICHT ausgewertet
; (fuer Alarm-Events zaehlt ALERT_STALE oben). Nur zur Parität mit dem
; lincot-Config-Stil vorhanden.
; COT_STALE = 3600

; PyTAK: DEBUG, TAK_PROTO, PREF_PACKAGE, PYTAK_TLS_* — see https://pytak.rtfd.io/
